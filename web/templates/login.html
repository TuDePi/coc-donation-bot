<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COC Bot – {{ "Create Account" if signup else "Login" }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f0a030;
      letter-spacing: 0.05em;
    }

    .logo p {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.3rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #f0a030;
    }

    .error {
      background: #2a1010;
      border: 1px solid #5a2020;
      color: #e08080;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .setup-note {
      background: #1a1a10;
      border: 1px solid #4a4010;
      color: #c0a840;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #f0a030;
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #e09020;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>COC Bot</h1>
      <p>{{ "Create Account" if signup else "Login" }}</p>
    </div>

    {% if signup %}
    <div class="setup-note">
      First-time setup — create your admin account. This cannot be changed without deleting <code>users.json</code>.
    </div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="{{ 'new-password' if signup else 'current-password' }}" required />
      </div>
      {% if signup %}
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required />
      </div>
      {% endif %}
      <button type="submit">{{ "Create Account" if signup else "Login" }}</button>
    </form>
  </div>
</body>
</html>
